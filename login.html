<!-- LOGIN -->
<div class="login-box">

    <h2 class="text-center">Giriş Yap</h2>

    <form onsubmit="return loginControl()">

        <div class="mb-3">
            <label>Öğrenci Mail</label>
            <input type="text" class="form-control" id="email">
        </div>

        <div class="mb-3">
            <label>Öğrenci No (Şifre)</label>
            <input type="password" class="form-control" id="password">
        </div>

        <button type="submit" class="btn btn-success w-100">Giriş Yap</button>

        <p id="msg" class="mt-3 text-center"></p>

    </form>

</div>

<script>
function loginControl() {

    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();
    let msg = document.getElementById("msg");

    //  PROJEYE UYGUN SABİT KULLANICI
    let correctEmail = "b2412100001@sakarya.edu.tr";
    let correctPassword = "b2412100001";

    if(email === "" || password === "") {
        msg.style.color = "red";
        msg.innerHTML = "❌ Tüm alanları doldurun!";
        return false;
    }

    if(email === correctEmail && password === correctPassword) {
        msg.style.color = "green";
        msg.innerHTML = "✅ Hoşgeldiniz " + correctPassword;
    } 
    else {
        msg.style.color = "red";
        msg.innerHTML = "❌ Bilgiler hatalı!";
    }

    return false;
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
