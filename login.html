<!-- LOGIN FORM -->
<main class="container">

    <section class="login-box">

        <h2 class="text-center mb-4">Giriş Yap</h2>

        <!-- PHP'ye gönderme -->
        <form action="login.php" method="POST" onsubmit="return validateLogin()">

            <!-- EMAIL -->
            <div class="mb-3">
                <label class="form-label">Öğrenci Mail</label>
                <input type="text" class="form-control" id="email" name="email">
            </div>

            <!-- PASSWORD -->
            <div class="mb-3">
                <label class="form-label">Öğrenci No (Şifre)</label>
                <input type="password" class="form-control" id="password" name="password">
            </div>

            <!-- BUTON -->
            <button type="submit" class="btn btn-success w-100">
                Giriş Yap
            </button>

            <p id="msg" class="mt-3 text-center"></p>

        </form>

    </section>

</main>

<script>
function validateLogin() {

    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();
    let msg = document.getElementById("msg");

    // boş kontrol
    if(email === "" || password === "") {
        msg.style.color = "red";
        msg.innerHTML = "❌ Tüm alanları doldurun!";
        return false;
    }

    // mail format kontrolü
    if(!email.includes("@") || !email.includes(".edu.tr")) {
        msg.style.color = "red";
        msg.innerHTML = "❌ Geçerli öğrenci maili girin!";
        return false;
    }

    // öğrenci mail format kontrolü
    if(!email.endsWith("@sakarya.edu.tr")) {
        msg.style.color = "red";
        msg.innerHTML = "❌ Mail sakarya uzantılı olmalı!";
        return false;
    }

    return true; // PHP'ye gönder
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
