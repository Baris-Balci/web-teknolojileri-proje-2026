    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fb;
        }

        .navbar-nav .nav-link {
            transition: 0.2s ease;
            padding: 8px 14px;
            border-radius: 8px;
            display: inline-block;
            min-width: 95px;
            text-align: center;
            border: 1px solid transparent;
        }

        .navbar-nav .nav-link:hover {
            background-color: rgba(255,255,255,0.1);
            color: #0d6efd !important;
            transform: none;
        }

        .nav-link.active {
            color: #0d6efd !important;
            font-weight: 600;
        }

        /* BOX */
        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-top: 40px;
        }

        h1, h3 {
            color: #212529;
            font-weight: 600;
        }

        /* CARD */
        .card-custom {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
            height: 100%;
        }

        .card-custom:hover {
            transform: translateY(-5px);
        }

        .card-custom img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .card-body {
            padding: 15px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">

    <a class="navbar-brand" href="index.html">Web Projem</a>

<!-- CONTENT -->
<div class="container">

    <div class="box">

        <h1>Dizi Listesi (API)</h1>
        <p>TVMaze API üzerinden çekilen dizi verileri gösterilmektedir.</p>

        <div class="row" id="showList"></div>

    </div>

</div>

<script>
    const apiURL = "https://api.tvmaze.com/shows";

    fetch(apiURL)
        .then(res => res.json())
        .then(data => {

            let output = "";

            data.slice(0, 6).forEach(show => {

                output += `
                <div class="col-md-4 mb-3">
                    <div class="card-custom">
                        <img src="${show.image ? show.image.medium : ''}" alt="${show.name}">
                        <div class="card-body">
                            <h5>${show.name}</h5>
                            <p>${show.genres.join(", ")}</p>
                        </div>
                    </div>
                </div>
                `;
            });

            document.getElementById("showList").innerHTML = output;
        });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
