<!-- FORM -->
<div class="container">

    <div class="box">

        <h1>İletişim Formu</h1>

        <p>Bana ulaşmak için aşağıdaki formu doldurabilirsiniz.</p>

        <form id="contactForm">

            <div class="mb-3">
                <label>Ad Soyad</label>
                <input type="text" class="form-control" id="name">
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="text" class="form-control" id="email">
            </div>

            <div class="mb-3">
                <label>Telefon</label>
                <input type="text" class="form-control" id="phone">
            </div>

            <div class="mb-3">
                <label>Mesaj</label>
                <textarea class="form-control" id="message"></textarea>
            </div>

            <button type="button" class="btn btn-primary w-100" onclick="validateForm()">
                Gönder
            </button>

        </form>

        <p id="result" class="mt-3"></p>

    </div>

</div>

<script>
function validateForm() {

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let message = document.getElementById("message").value.trim();

    let result = document.getElementById("result");

    // boş kontrol
    if(name === "" || email === "" || phone === "" || message === "") {
        result.style.color = "red";
        result.innerHTML = "❌ Lütfen tüm alanları doldurun!";
        return;
    }

    // email kontrol
    if(!email.includes("@")) {
        result.style.color = "red";
        result.innerHTML = "❌ Geçerli email girin!";
        return;
    }

    // telefon kontrol
    if(!/^[0-9]+$/.test(phone)) {
        result.style.color = "red";
        result.innerHTML = "❌ Telefon sadece rakam olmalı!";
        return;
    }

    result.style.color = "green";
    result.innerHTML = "✅ Form başarıyla doğrulandı!";
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
