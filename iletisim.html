<!-- FORM -->
<div class="container-fluid px-5">
<div class="box">

<h1>İletişim Formu</h1>

<form action="iletisim.php" method="POST" id="contactForm">

    <!-- TEXT -->
    <div class="mb-3">
        <label>Ad Soyad</label>
        <input type="text" class="form-control" id="name" name="name" oninput="resetValidation()">
    </div>

    <!-- EMAIL -->
    <div class="mb-3">
        <label>Email</label>
        <input type="text" class="form-control" id="email" name="email" oninput="resetValidation()">
    </div>

    <!-- TELEFON -->
    <div class="mb-3">
        <label>Telefon</label>
        <input type="text" class="form-control" id="phone" name="phone" oninput="resetValidation()">
    </div>

    <!-- DATE -->
    <div class="mb-3">
        <label>Tarih</label>
        <input type="date" class="form-control" id="date" name="date" onchange="resetValidation()">
    </div>

    <!-- NUMBER -->
    <div class="mb-3">
        <label>Yaş</label>
        <input type="number" class="form-control" id="age" name="age" min="0" max="120" oninput="resetValidation()">
    </div>

    <!-- SELECT -->
    <div class="mb-3">
        <label>Konu</label>
        <select class="form-control" name="subject" id="subject" onchange="resetValidation()">
            <option value="">Seçiniz</option>
            <option>Genel</option>
            <option>Destek</option>
            <option>İş</option>
        </select>
    </div>

    <!-- RADIO -->
    <div class="mb-3">
        <label>İletişim Tercihi</label><br>
        <input type="radio" name="contactType" value="email" onchange="resetValidation()"> Email
        <input type="radio" name="contactType" value="telefon" onchange="resetValidation()"> Telefon
    </div>

    <!-- CHECKBOX GROUP -->
    <div class="mb-3">
        <label>İlgi Alanları</label><br>
        <input type="checkbox" name="interest[]" value="yazilim"> Yazılım
        <input type="checkbox" name="interest[]" value="oyun"> Oyun
        <input type="checkbox" name="interest[]" value="film"> Film
    </div>

    <!-- RANGE -->
    <div class="mb-3">
        <label>Memnuniyet (0-10)</label>
        <input type="range" class="form-range" min="0" max="10" id="range" name="range" onchange="resetValidation()">
    </div>

    <!-- DATALIST -->
    <div class="mb-3">
        <label>Şehir</label>
        <input list="cities" class="form-control" name="city" oninput="resetValidation()">
        <datalist id="cities">
            <option value="Sakarya">
            <option value="İstanbul">
            <option value="Ankara">
        </datalist>
    </div>

    <!-- FILE -->
    <div class="mb-3">
        <label>Dosya Yükle</label>
        <input type="file" class="form-control" name="file" onchange="resetValidation()">
    </div>

    <!-- KVKK -->
    <div class="mb-3">
        <input type="checkbox" id="agree" name="agree" onchange="resetValidation()">
        <label>KVKK kabul ediyorum</label>
    </div>

    <!-- MESAJ -->
    <div class="mb-3">
        <label>Mesaj</label>
        <textarea class="form-control" id="message" name="message" oninput="resetValidation()"></textarea>
    </div>

    <!-- BUTONLAR -->
     <button type="button" class="btn btn-secondary w-100 mb-2" onclick="clearForm()">
        Temizle
    </button>

    <button type="button" class="btn btn-primary w-100 mb-2" onclick="validateNative()">
        JS Doğrula
    </button>

    <button type="button" class="btn btn-warning w-100" onclick="validateVueLike()">
        Framework Doğrula
    </button>

    <button type="submit" id="submitBtn" class="btn btn-success w-100 mt-2" disabled>
        Gönder (PHP)
    </button>

    <p id="result" class="mt-3"></p>

</form>

</div>
</div>

<script>

let nativeOK = false;
let frameworkOK = false;

function resetValidation() {
    nativeOK = false;
    frameworkOK = false;
    document.getElementById("submitBtn").disabled = true;
}

// =======================
// Native JS
// =======================
function validateNative() {

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let message = document.getElementById("message").value.trim();
    let subject = document.getElementById("subject").value;
    let age = document.getElementById("age").value;
    let date = document.getElementById("date").value;

    let agree = document.getElementById("agree").checked;
    let contactType = document.querySelector('input[name="contactType"]:checked');

    let result = document.getElementById("result");

    // BOŞ KONTROL
    if(!name || !email || !phone || !message || !subject || age === "" || !date) {
        nativeOK = false;
        result.innerHTML = "❌ Tüm alanları doldur!";
        result.style.color = "red";
        return;
    }

    // YAŞ KONTROL
    if(age < 0 || age > 120) {
        nativeOK = false;
        result.innerHTML = "❌ Yaş 0-120 arasında olmalı!";
        return;
    }

    // EMAIL
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        nativeOK = false;
        result.innerHTML = "❌ Email hatalı!";
        return;
    }

    // TELEFON (11 hane + 05 ile başlasın)
    if(!/^05[0-9]{9}$/.test(phone)) {
        nativeOK = false;
        result.innerHTML = "❌ Telefon 05 ile başlamalı ve 11 haneli olmalı!";
        return;
    }

    // KVKK + RADIO
    if(!agree || !contactType) {
        nativeOK = false;
        result.innerHTML = "❌ Eksik seçim!";
        return;
    }

    nativeOK = true;
    result.innerHTML = "✅ Native JS OK";
    result.style.color = "green";

    checkSubmit();
}

// =======================
// Framework Tarzı
// =======================
function validateVueLike() {

    let age = document.getElementById("age").value;
    let date = document.getElementById("date").value;

    const form = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        message: document.getElementById("message").value.trim(),
        subject: document.getElementById("subject").value,
        agree: document.getElementById("agree").checked
    };

    let contactType = document.querySelector('input[name="contactType"]:checked');
    let result = document.getElementById("result");

    if(Object.values(form).includes("") || !form.agree || !contactType || age === "" || !date) {
        frameworkOK = false;
        result.innerHTML = "❌ Framework hata";
        result.style.color = "red";
        return;
    }

    // YAŞ
    if(age < 0 || age > 120) {
        frameworkOK = false;
        result.innerHTML = "❌ Yaş geçersiz!";
        return;
    }

    frameworkOK = true;
    result.innerHTML = "✅ Framework OK";
    result.style.color = "green";

    checkSubmit();
}

// =======================
// SUBMIT AKTİF
// =======================
function checkSubmit() {
    document.getElementById("submitBtn").disabled = !(nativeOK && frameworkOK);
}

function clearForm() {

    // formu sıfırla
    document.getElementById("contactForm").reset();

    // validation durumlarını sıfırla
    nativeOK = false;
    frameworkOK = false;

    // submit pasif
    document.getElementById("submitBtn").disabled = true;

    // mesaj temizle
    document.getElementById("result").innerHTML = "";
}

</script>
