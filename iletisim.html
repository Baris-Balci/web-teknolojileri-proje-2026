<!-- FORM -->
<div class="container">

<div class="box">

    <h1>İletişim Formu</h1>

    <form action="iletisim.php" method="POST" id="contactForm">

        <!-- TEXT -->
        <div class="mb-3">
            <label>Ad Soyad</label>
            <input type="text" class="form-control" id="name" name="name">
        </div>

        <!-- EMAIL -->
        <div class="mb-3">
            <label>Email</label>
            <input type="text" class="form-control" id="email" name="email">
        </div>

        <!-- TELEFON -->
        <div class="mb-3">
            <label>Telefon</label>
            <input type="text" class="form-control" id="phone" name="phone">
        </div>

        <!-- SELECT -->
        <div class="mb-3">
            <label>Konu</label>
            <select class="form-control" name="subject" id="subject">
                <option value="">Seçiniz</option>
                <option>Genel</option>
                <option>Destek</option>
                <option>İş</option>
            </select>
        </div>

        <!-- RADIO -->
        <div class="mb-3">
            <label>İletişim Tercihi</label><br>

            <input type="radio" name="contactType" value="email"> Email
            <input type="radio" name="contactType" value="telefon"> Telefon
        </div>

        <!-- CHECKBOX -->
        <div class="mb-3">
            <input type="checkbox" id="agree">
            <label>KVKK kabul ediyorum</label>
        </div>

        <!-- MESAJ -->
        <div class="mb-3">
            <label>Mesaj</label>
            <textarea class="form-control" id="message" name="message"></textarea>
        </div>

        <!-- BUTON 1: NATIVE JS -->
        <button type="button" class="btn btn-primary w-100 mb-2" onclick="validateNative()">
            JS Doğrula
        </button>

        <!-- BUTON 2: "FRAMEWORK" (SIMULATED) -->
        <button type="button" class="btn btn-warning w-100" onclick="validateVueLike()">
            Framework Doğrula
        </button>

        <!-- GÖNDER BUTONU (PHP İÇİN) -->
        <button type="submit" class="btn btn-success w-100 mt-2">
            Gönder (PHP)
        </button>

        <p id="result" class="mt-3"></p>

    </form>

</div>

</div>

<script>
// =======================
// 1) NATIVE JS VALIDATION
// =======================
function validateNative() {

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let message = document.getElementById("message").value.trim();
    let subject = document.getElementById("subject").value;
    let agree = document.getElementById("agree").checked;

    let result = document.getElementById("result");

    if(!name || !email || !phone || !message || !subject) {
        result.style.color = "red";
        result.innerHTML = "❌ Tüm alanları doldur!";
        return;
    }

    if(!email.includes("@")) {
        result.innerHTML = "❌ Email hatalı!";
        return;
    }

    if(!/^[0-9]+$/.test(phone)) {
        result.innerHTML = "❌ Telefon sadece rakam olmalı!";
        return;
    }

    if(!agree) {
        result.innerHTML = "❌ KVKK onayla!";
        return;
    }

    result.style.color = "green";
    result.innerHTML = "✅ Native JS: Başarılı!";
}

// =======================
// 2) FRAMEWORK SIMULATION
// =======================
function validateVueLike() {

    const form = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        message: document.getElementById("message").value.trim(),
        subject: document.getElementById("subject").value,
        agree: document.getElementById("agree").checked
    };

    let result = document.getElementById("result");

    if(Object.values(form).includes("") || !form.agree) {
        result.innerHTML = "❌ Framework: Eksik veri!";
        result.style.color = "red";
        return;
    }

    result.innerHTML = "✅ Framework: Başarılı!";
    result.style.color = "green";
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
