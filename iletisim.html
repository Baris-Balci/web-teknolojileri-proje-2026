<!-- FORM -->
<div class="container-fluid px-5">
    
<div class="box">

    <h1>İletişim Formu</h1>

    <form action="iletisim.php" method="POST" id="contactForm">

        <div class="mb-3">
            <label>Ad Soyad</label>
            <input type="text" class="form-control" id="name" name="name" oninput="resetValidation()">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="text" class="form-control" id="email" name="email" oninput="resetValidation()">
        </div>

        <div class="mb-3">
            <label>Telefon</label>
            <input type="text" class="form-control" id="phone" name="phone" oninput="resetValidation()">
        </div>

        <div class="mb-3">
            <label>Konu</label>
            <select class="form-control" name="subject" id="subject" onchange="resetValidation()">
                <option value="">Seçiniz</option>
                <option>Genel</option>
                <option>Destek</option>
                <option>İş</option>
            </select>
        </div>

        <div class="mb-3">
            <label>İletişim Tercihi</label><br>
            <input type="radio" name="contactType" value="email" onchange="resetValidation()"> Email
            <input type="radio" name="contactType" value="telefon" onchange="resetValidation()"> Telefon
        </div>

        <div class="mb-3">
            <input type="checkbox" id="agree" name="agree" onchange="resetValidation()">
            <label>KVKK kabul ediyorum</label>
        </div>

        <div class="mb-3">
            <label>Mesaj</label>
            <textarea class="form-control" id="message" name="message" oninput="resetValidation()"></textarea>
        </div>

        <button type="button" class="btn btn-primary w-100 mb-2" onclick="validateNative()">
            JS Doğrula
        </button>

        <button type="button" class="btn btn-warning w-100" onclick="validateVueLike()">
            Framework Doğrula
        </button>

        <button type="submit" id="submitBtn" class="btn btn-success w-100 mt-2" disabled>
            Gönder (PHP)
        </button>

        <p id="result" class="mt-3"></p>

    </form>

</div>

</div>

<script>

// GLOBAL DURUM
let nativeOK = false;
let frameworkOK = false;

// FORM DEĞİŞİNCE SIFIRLA
function resetValidation() {
    nativeOK = false;
    frameworkOK = false;
    document.getElementById("submitBtn").disabled = true;
}

// =======================
// 1) NATIVE JS
// =======================
function validateNative() {

    let name = nameVal = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let message = document.getElementById("message").value.trim();
    let subject = document.getElementById("subject").value;
    let agree = document.getElementById("agree").checked;
    let contactType = document.querySelector('input[name="contactType"]:checked');

    let result = document.getElementById("result");

    if(!name || !email || !phone || !message || !subject) {
        nativeOK = false;
        result.innerHTML = "❌ Tüm alanları doldur!";
        result.style.color = "red";
        return;
    }

    let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(!emailPattern.test(email)) {
        nativeOK = false;
        result.innerHTML = "❌ Geçerli email gir!";
        return;
    }

    if(!/^[0-9]+$/.test(phone)) {
        nativeOK = false;
        result.innerHTML = "❌ Telefon sadece rakam olmalı!";
        return;
    }

    if(!agree) {
        nativeOK = false;
        result.innerHTML = "❌ KVKK onayla!";
        return;
    }

    if(!contactType) {
        nativeOK = false;
        result.innerHTML = "❌ İletişim tercihi seç!";
        return;
    }

    nativeOK = true;
    result.innerHTML = "✅ Native JS: Başarılı!";
    result.style.color = "green";

    checkSubmit();
}

// =======================
// 2) FRAMEWORK TARZI
// =======================
function validateVueLike() {

    const form = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        message: document.getElementById("message").value.trim(),
        subject: document.getElementById("subject").value,
        agree: document.getElementById("agree").checked
    };

    let contactType = document.querySelector('input[name="contactType"]:checked');
    let result = document.getElementById("result");

    if(Object.values(form).includes("") || !form.agree || !contactType) {
        frameworkOK = false;
        result.innerHTML = "❌ Framework: Eksik veri!";
        result.style.color = "red";
        return;
    }

    frameworkOK = true;
    result.innerHTML = "✅ Framework: Başarılı!";
    result.style.color = "green";

    checkSubmit();
}

// =======================
// SUBMIT KONTROL
// =======================
function checkSubmit() {
    let btn = document.getElementById("submitBtn");

    if(nativeOK && frameworkOK) {
        btn.disabled = false;
    } else {
        btn.disabled = true;
    }
}

</script>
